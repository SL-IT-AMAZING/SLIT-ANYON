name: engine-publish-platform
run-name: "engine platform packages ${{ inputs.version }}"

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      dist_tag:
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 3.0.0-beta.12)"
        required: true
        type: string
      dist_tag:
        description: "npm dist tag (e.g., beta, latest)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write

defaults:
  run:
    shell: bash
    working-directory: engine

jobs:
  build:
    runs-on: ${{ startsWith(matrix.platform, 'windows-') && 'windows-latest' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      max-parallel: 11
      matrix:
        platform:
          [darwin-arm64, darwin-x64, darwin-x64-baseline, linux-x64, linux-x64-baseline, linux-arm64, linux-x64-musl, linux-x64-musl-baseline, linux-arm64-musl, windows-x64, windows-x64-baseline]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        env:
          BUN_INSTALL_ALLOW_SCRIPTS: "@ast-grep/napi"

      - name: Check if already published
        id: check
        run: |
          PKG_NAME="@anyon-cli/anyon-${{ matrix.platform }}"
          VERSION="${{ inputs.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/${PKG_NAME}/${VERSION}")
          if [ "$STATUS" = "200" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version in package.json
        if: steps.check.outputs.skip != 'true'
        run: |
          VERSION="${{ inputs.version }}"
          cd packages/${{ matrix.platform }}
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      - name: Pre-download baseline compile target
        if: steps.check.outputs.skip != 'true' && endsWith(matrix.platform, '-baseline')
        run: |
          BUN_VERSION=$(bun --version)
          PLATFORM="${{ matrix.platform }}"
          PKG_NAME="bun-${PLATFORM}"
          CACHE_DIR=$(bun pm cache)
          CACHE_DEST="${CACHE_DIR}/${PKG_NAME}-v${BUN_VERSION}"
          if [[ -f "$CACHE_DEST" ]]; then exit 0; fi
          TARBALL_URL="https://registry.npmjs.org/@oven/bun-${PLATFORM}/-/bun-${PLATFORM}-${BUN_VERSION}.tgz"
          mkdir -p "$(dirname "$CACHE_DEST")"
          TMP_DIR=$(mktemp -d)
          curl -fsSL --retry 5 --retry-delay 5 "${TARBALL_URL}" | tar -xzf - -C "${TMP_DIR}"
          if [[ "$PLATFORM" == windows-* ]]; then BIN_NAME="bun.exe"; else BIN_NAME="bun"; fi
          if [[ -f "${TMP_DIR}/package/bin/${BIN_NAME}" ]]; then
            cp "${TMP_DIR}/package/bin/${BIN_NAME}" "${CACHE_DEST}"
          elif [[ -f "${TMP_DIR}/package/${BIN_NAME}" ]]; then
            cp "${TMP_DIR}/package/${BIN_NAME}" "${CACHE_DEST}"
          else
            find "${TMP_DIR}" -type f
            exit 1
          fi
          chmod +x "${CACHE_DEST}" 2>/dev/null || true

      - name: Build binary
        if: steps.check.outputs.skip != 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 5
          retry_wait_seconds: 10
          shell: bash
          command: |
            PLATFORM="${{ matrix.platform }}"
            case "$PLATFORM" in
              darwin-arm64) TARGET="bun-darwin-arm64" ;;
              darwin-x64) TARGET="bun-darwin-x64" ;;
              darwin-x64-baseline) TARGET="bun-darwin-x64-baseline" ;;
              linux-x64) TARGET="bun-linux-x64" ;;
              linux-x64-baseline) TARGET="bun-linux-x64-baseline" ;;
              linux-arm64) TARGET="bun-linux-arm64" ;;
              linux-x64-musl) TARGET="bun-linux-x64-musl" ;;
              linux-x64-musl-baseline) TARGET="bun-linux-x64-musl-baseline" ;;
              linux-arm64-musl) TARGET="bun-linux-arm64-musl" ;;
              windows-x64) TARGET="bun-windows-x64" ;;
              windows-x64-baseline) TARGET="bun-windows-x64-baseline" ;;
            esac
            if [[ "$PLATFORM" == windows-* ]]; then OUTPUT="packages/${PLATFORM}/bin/anyon.exe"; else OUTPUT="packages/${PLATFORM}/bin/anyon"; fi
            bun build src/cli/index.ts --compile --minify --target=$TARGET --outfile=$OUTPUT

      - name: Compress binary
        if: steps.check.outputs.skip != 'true'
        run: |
          PLATFORM="${{ matrix.platform }}"
          cd packages/${PLATFORM}
          if [[ "$PLATFORM" == windows-* ]]; then
            7z a -tzip ../../binary-${PLATFORM}.zip bin/ package.json
          else
            tar -czvf ../../binary-${PLATFORM}.tar.gz bin/ package.json
          fi

      - name: Upload artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: |
            engine/binary-${{ matrix.platform }}.tar.gz
            engine/binary-${{ matrix.platform }}.zip
          retention-days: 1
          if-no-files-found: error

  publish:
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        platform:
          [darwin-arm64, darwin-x64, darwin-x64-baseline, linux-x64, linux-x64-baseline, linux-arm64, linux-x64-musl, linux-x64-musl-baseline, linux-arm64-musl, windows-x64, windows-x64-baseline]
    steps:
      - name: Check if already published
        id: check
        run: |
          PKG_NAME="@anyon-cli/anyon-${{ matrix.platform }}"
          VERSION="${{ inputs.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/${PKG_NAME}/${VERSION}")
          if [ "$STATUS" = "200" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Download artifact
        id: download
        if: steps.check.outputs.skip != 'true'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: engine

      - name: Extract artifact
        if: steps.check.outputs.skip != 'true' && steps.download.outcome == 'success'
        run: |
          PLATFORM="${{ matrix.platform }}"
          mkdir -p packages/${PLATFORM}
          if [[ "$PLATFORM" == windows-* ]]; then
            unzip binary-${PLATFORM}.zip -d packages/${PLATFORM}/
          else
            tar -xzvf binary-${PLATFORM}.tar.gz -C packages/${PLATFORM}/
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip != 'true' && steps.download.outcome == 'success'
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish ${{ matrix.platform }}
        if: steps.check.outputs.skip != 'true' && steps.download.outcome == 'success'
        run: |
          cd packages/${{ matrix.platform }}
          TAG_ARG=""
          if [ -n "${{ inputs.dist_tag }}" ]; then
            TAG_ARG="--tag ${{ inputs.dist_tag }}"
          fi
          npm publish --access public $TAG_ARG
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        timeout-minutes: 15
